---
# 1. Public Subnet A 조회
- name: Get Public Subnet A info
  amazon.aws.ec2_vpc_subnet_info:
    region: "{{ region }}"
    filters:
      "tag:Name": "{{ prefix }}-pub-a"
  register: subnet_info

# 2. 보안 그룹 조회
- name: Get Security Group IDs
  amazon.aws.ec2_security_group_info:
    region: "{{ region }}"
    filters:
      group-name:
        - "{{ prefix }}-ssh-sg"
        - "{{ prefix }}-web-sg"
  register: sg_info

# 3. 원본 EC2 1대만 유지하며 생성
- name: Launch App Origin EC2
  amazon.aws.ec2_instance:
    name: "{{ prefix }}-app-origin"
    region: "{{ region }}"
    image_id: "{{ ami_id }}"
    instance_type: "{{ instance_type }}"
    key_name: "{{ key_name }}"
    vpc_subnet_id: "{{ subnet_info.subnets[0].id }}"
    security_groups: "{{ sg_info.security_groups | map(attribute='group_id') | list }}"
    iam_instance_profile: "{{ prefix }}-app-instance-profile"
    network:
      assign_public_ip: yes
    user_data: |
      #!/bin/bash
      set -eux
      export DEBIAN_FRONTEND=noninteractive

      apt-get update -y
      apt-get install -y docker.io ruby-full wget git zip unzip
      # apt-get install -y nginx

      # systemctl enable nginx
      # systemctl start nginx

      systemctl enable docker
      systemctl start docker

      echo "nginx ready - waiting for app" > /var/www/html/index.html

      # cat <<EOF > /etc/nginx/sites-available/default
      # server {
      #     listen 80;
      #     server_name _;

      #     root /var/www/html;
      #     index index.html;

      #     location / {
      #         proxy_pass http://127.0.0.1:8080;
      #         proxy_connect_timeout 1s;
      #         proxy_read_timeout 3s;
      #         proxy_send_timeout 3s;

      #         proxy_set_header Host \$host;
      #         proxy_set_header X-Real-IP \$remote_addr;
      #         proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
      #         proxy_set_header X-Forwarded-Proto \$scheme;

      #         proxy_intercept_errors on;
      #         error_page 502 503 504 = @fallback;
      #     }

      #     location @fallback {
      #         try_files /index.html =200;
      #     }
      # }
      # EOF

      # systemctl restart nginx

      cd /home/ubuntu
      wget https://aws-codedeploy-{{ region }}.s3.{{ region }}.amazonaws.com/latest/install
      chmod +x ./install
      ./install auto
      systemctl enable codedeploy-agent
      systemctl start codedeploy-agent

    tags:
      Name: "{{ prefix }}-app-origin"
      Role: "Origin"
  register: ec2_origin

# 4. 인스턴스 running 상태 대기
- name: Wait until instance is running
  amazon.aws.ec2_instance_info:
    instance_ids: "{{ ec2_origin.instance_ids }}"
    region: "{{ region }}"
  register: wait_ec2
  until: wait_ec2.instances[0].state.name == 'running'
  retries: 15
  delay: 20

# 5. user_data 완료 추가 대기
- name: Wait extra time for user_data completion
  ansible.builtin.pause:
    seconds: 180

# 6. AMI 생성
- name: Create AMI from App Origin Instance
  amazon.aws.ec2_ami:
    instance_id: "{{ ec2_origin.instance_ids[0] }}"
    name: "{{ prefix }}-app-image-{{ lookup('pipe', 'date +%Y%m%d%H%M%S') }}"
    region: "{{ region }}"
    wait: true
    tags:
      Name: "{{ prefix }}-app-image"
      SourceInstance: "{{ prefix }}-app-origin"
  register: created_ami

# 7. 생성된 AMI ID 출력
- name: Display Created AMI ID
  ansible.builtin.debug:
    msg: "New AMI ID is {{ created_ami.image_id }}"