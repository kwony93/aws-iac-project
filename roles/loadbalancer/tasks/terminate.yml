---
# 1. ALB 삭제 (리스너와 규칙은 ALB가 삭제될 때 자동으로 함께 삭제됩니다)
- name: Delete Application Load Balancer
  elb_application_lb:
    name: "{{ prefix }}-alb"
    region: "{{ region }}"
    state: absent
    wait: yes

# 2. 대상 그룹 삭제 (대상 그룹은 ALB와 별개이므로 명시적으로 지워야 합니다)
- name: Delete App Target Group
  elb_target_group:
    name: "{{ prefix }}-app-tg"
    region: "{{ region }}"
    state: absent

- name: Delete Jenkins Target Group
  elb_target_group:
    name: "{{ prefix }}-jenkins-tg"
    region: "{{ region }}"
    state: absent

# 3. (선택 사항) 로드밸런서용 보안 그룹 조회 및 삭제
# 보안 그룹은 다른 리소스(EC2 등)에서 참조 중이면 삭제되지 않으므로 주의가 필요합니다.
- name: Get Web Security Group Info
  amazon.aws.ec2_group_info:
    region: "{{ region }}"
    filters:
      group-name: "{{ prefix }}-web-sg"
  register: web_sg_info

- name: Delete Web Security Group
  amazon.aws.ec2_group:
    id: "{{ web_sg_info.security_groups[0].group_id }}"
    region: "{{ region }}"
    state: absent
  when: web_sg_info.security_groups | length > 0
  ignore_errors: yes # 다른 리소스가 사용 중일 경우를 대비해 에러 무시 설정