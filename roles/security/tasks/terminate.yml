# 1. VPC ID 조회
- name: Get VPC ID for Termination
  amazon.aws.ec2_vpc_net_info:
    region: "{{ region }}"
    filters:
      "tag:Name": "{{ prefix }}-vpc"
  register: vpc_info

# 2. 보안 그룹 삭제 (이름 기준)
- name: Remove Security Groups
  amazon.aws.ec2_security_group:
    name: "{{ item }}"
    vpc_id: "{{ vpc_info.vpcs[0].id }}"
    region: "{{ region }}"
    state: absent
  loop:
    - "{{ prefix }}-ssm-sg"
    - "{{ prefix }}-web-sg"
    - "{{ prefix }}-ssh-sg"
  when: vpc_info.vpcs | length > 0