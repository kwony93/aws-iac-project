# 1. VPC 생성
- name: Create VPC
  amazon.aws.ec2_vpc_net:
    name: "{{ prefix }}-vpc"
    cidr_block: "{{ vpc_cidr }}"
    region: "{{ region }}"
    tags:
      Name: "{{ prefix }}-vpc"
  register: vpc_result

# 2. Subnets 생성 (Public & Private)
- name: Create Subnets
  amazon.aws.ec2_vpc_subnet:
    vpc_id: "{{ vpc_result.vpc.id }}"
    cidr: "{{ item.cidr }}"
    az: "{{ item.az }}"
    region: "{{ region }}"
    tags:
      Name: "{{ prefix }}-{{ item.name }}"
  loop: "{{ pub_subnets + pri_subnets }}"
  register: subnet_results

# 3. Internet Gateway 생성
- name: Create IGW
  amazon.aws.ec2_vpc_igw:
    vpc_id: "{{ vpc_result.vpc.id }}"
    region: "{{ region }}"
    tags:
      Name: "{{ prefix }}-igw"
  register: igw_result

# 4. NAT Gateway용 Elastic IP 할당
- name: Allocate EIP for NAT Gateway
  amazon.aws.ec2_eip:
    region: "{{ region }}"
    tags:
      Name: "{{ prefix }}-nat-eip"
  register: nat_eip

# 5. NAT Gateway 생성 (첫 번째 Public Subnet에 배치)
- name: Create NAT Gateway
  amazon.aws.ec2_vpc_nat_gateway:
    state: present
    region: "{{ region }}"
    subnet_id: "{{ (subnet_results.results | selectattr('item.name', 'equalto', 'pub-a') | first).subnet.id }}"
    allocation_id: "{{ nat_eip.allocation_id }}"
    tags:
      Name: "{{ prefix }}-ngw"
    wait: yes
  register: nat_gw_result

# 6. Public Route Table 생성 및 IGW 연결
- name: Create Public Route Table
  amazon.aws.ec2_vpc_route_table:
    vpc_id: "{{ vpc_result.vpc.id }}"
    region: "{{ region }}"
    tags:
      Name: "{{ prefix }}-pub-rt"
    subnets: "{{ subnet_results.results | selectattr('item.name', 'search', 'pub') | map(attribute='subnet.id') | list }}"
    routes:
      - dest: 0.0.0.0/0
        gateway_id: "{{ igw_result.gateway_id }}"

# 7. Private Route Table 생성 및 NAT GW 연결
- name: Create Private Route Table
  amazon.aws.ec2_vpc_route_table:
    vpc_id: "{{ vpc_result.vpc.id }}"
    region: "{{ region }}"
    tags:
      Name: "{{ prefix }}-pri-rt"
    subnets: "{{ subnet_results.results | selectattr('item.name', 'search', 'pri') | map(attribute='subnet.id') | list }}"
    routes:
      - dest: 0.0.0.0/0
        gateway_id: "{{ nat_gw_result.nat_gateway_id }}"