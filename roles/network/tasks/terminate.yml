# 1. VPC ID 조회 (이름 기준)
- name: Get VPC ID
  amazon.aws.ec2_vpc_net_info:
    region: "{{ region }}"
    filters:
      "tag:Name": "{{ prefix }}-vpc"
  register: vpc_info

- name: Set VPC ID Fact
  set_fact:
    target_vpc_id: "{{ vpc_info.vpcs[0].id }}"
  when: vpc_info.vpcs | length > 0

# 2. Route Tables 삭제
- name: Remove Route Tables
  amazon.aws.ec2_vpc_route_table:
    vpc_id: "{{ target_vpc_id }}"
    region: "{{ region }}"
    state: absent
    lookup: tag
    tags:
      Name: "{{ item }}"
  loop: ["{{ prefix }}-pub-rt", "{{ prefix }}-pri-rt"]
  ignore_errors: yes

# 3. NAT Gateway 삭제 및 EIP 릴리스
- name: Remove NAT Gateway
  amazon.aws.ec2_vpc_nat_gateway:
    state: absent
    region: "{{ region }}"
    wait: yes
    if_exist_do_not_create: yes
  # NAT GW는 별도의 ID 조회가 필요할 수 있으나 태그나 서브넷 기반으로 처리 가능

- name: Release NAT EIP
  amazon.aws.ec2_eip:
    region: "{{ region }}"
    state: absent
    tag_name: Name
    tag_value: "{{ prefix }}-nat-eip"

# 4. Subnets 삭제
- name: Remove Subnets
  amazon.aws.ec2_vpc_subnet:
    vpc_id: "{{ target_vpc_id }}"
    region: "{{ region }}"
    state: absent
    cidr: "{{ item.cidr }}"
  loop: "{{ pub_subnets + pri_subnets }}"

# 5. IGW 삭제
- name: Remove IGW
  amazon.aws.ec2_vpc_igw:
    vpc_id: "{{ target_vpc_id }}"
    region: "{{ region }}"
    state: absent

# 6. VPC 삭제
- name: Remove VPC
  amazon.aws.ec2_vpc_net:
    name: "{{ prefix }}-vpc"
    cidr_block: "{{ vpc_cidr }}"
    region: "{{ region }}"
    state: absent